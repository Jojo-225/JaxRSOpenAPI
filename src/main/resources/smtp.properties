# SMTP configuration for concert email alerts
# Fill these values for your provider (Mailtrap, Gmail SMTP relay, SendGrid SMTP, etc.)

SMTP_HOST=
SMTP_PORT=587
SMTP_FROM=

# true if your SMTP server requires login/password
SMTP_AUTH=true
SMTP_USERNAME=
SMTP_PASSWORD=

# true in most modern SMTP providers
SMTP_STARTTLS=true

